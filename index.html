<!DOCTYPE html>
<!-- Open the root html element -->
<html lang="en">
<!-- Open the head section -->
<head>
    <!-- Define character encoding -->
    <meta charset="UTF-8">
    <!-- Make layout responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open and close the title tag with page title text -->
    <title>Welcome to My Meme Page</title>
    <!-- Open style block for a nicer look and feel -->
   
    <!-- Close the head section -->
</head>
<!-- Open the body section -->
<body>
    <!-- Open a wrapper section for content styling -->
    <section class="card">
        <!-- Open and close header tags using h1 -->
        <h1>Learning HTML with a Meme</h1>
        <!-- Open paragraph tags -->
        <p>
            <!-- Add meme image between opening and closing paragraph tags -->
            <img id="memeImage" src="school-meme.jpg" alt="School-appropriate coding meme">
        </p>
        <!-- Open and close another paragraph for description text -->
        <p>
            This page includes all the basic HTML tags and a fun meme image to complete the assignment.
        </p>
    </section>
    <!-- Close the body section -->
</body>
<!-- Close the html document -->
</html>
